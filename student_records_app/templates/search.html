<!DOCTYPE html>
<html>
<head>
    <title>Search Students</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="container">
    <h1>Search Students</h1>

    <form method="POST">
        <input type="text" name="keyword" placeholder="Search by name or major" required>

        <button type="submit">Search</button>
    </form>

    <a href="/" class="btn">Home</a>

    {% if students %}
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Major</th>
            <th>GPA</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.student_id }}</td>
            <td>{{ student.first_name }} {{ student.last_name }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.major }}</td>
            <td>{{ student.gpa }}</td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}
</div>

</body>
</html>
